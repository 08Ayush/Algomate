# Pytest configuration
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts = 
    -v
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --asyncio-mode=auto

# Coverage configuration
[coverage:run]
source = .
omit = 
    tests/*
    *__init__.py
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
